name: Release Build

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: volkrix-x86_64-unknown-linux-gnu.tar.gz
            binary: volkrix
          - os: macos-15
            target: aarch64-apple-darwin
            archive: volkrix-aarch64-apple-darwin.tar.gz
            binary: volkrix
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: volkrix-x86_64-pc-windows-msvc.zip
            binary: volkrix.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --package volkrix --bin volkrix --target ${{ matrix.target }}

      - name: Prepare release bundle
        shell: bash
        run: |
          bundle_dir="volkrix-${{ matrix.target }}"
          mkdir -p "$bundle_dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$bundle_dir/${{ matrix.binary }}"
          cp README.md LICENSE-MIT LICENSE-APACHE "$bundle_dir/"

      - name: Create tarball
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "${{ matrix.archive }}" "volkrix-${{ matrix.target }}"

      - name: Create zip archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "volkrix-${{ matrix.target }}" -DestinationPath "${{ matrix.archive }}"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.archive }}" --clobber
